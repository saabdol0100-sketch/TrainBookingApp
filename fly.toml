app = "trainbookingapp"
primary_region = "cdg"

[build]

[env]
  PORT = "3000"
  NODE_ENV = "production"
  IS_PRIMARY = "true"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1